groups:
- name: infrastructure_alerts
  rules:
  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Instance {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

  - alert: EndpointDown
    expr: probe_success == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Endpoint {{ $labels.instance }} down"
      description: "Endpoint {{ $labels.instance }} has failed to respond with 2xx."

  - alert: HighCPUUsage
    expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 70
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High CPU Usage on {{ $labels.instance }}"
      description: "CPU usage is above 70% (currently {{ $value | printf \"%.2f\" }}%)."

  - alert: HighMemoryUsage
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 70
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Memory Usage on {{ $labels.instance }}"
      description: "Memory usage is above 70% (currently {{ $value | printf \"%.2f\" }}%)."

  - alert: HighDiskUsage
    expr: (1 - (node_filesystem_avail_bytes{mountpoint="/rootfs"} / node_filesystem_size_bytes{mountpoint="/rootfs"})) * 100 > 70
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Disk Usage on {{ $labels.instance }}"
      description: "Disk usage on {{ $labels.mountpoint }} is above 70% (currently {{ $value | printf \"%.2f\" }}%)."

  - alert: AvailabilitySLOViolation
    expr: |
      sum(rate(http_server_duration_count{exported_job="go-web-service", http_response_status_code!~"5.."}[5m])) 
      / 
      sum(rate(http_server_duration_count{exported_job="go-web-service"}[5m])) < 0.99
    for: 2m
    labels:
      severity: critical
    annotations:
      runbook_url: "https://wiki.internal/runbooks/service-health"
      summary: "Availability SLO Violated (Success Rate < 99%)"
      description: "Service success rate has dropped to {{ $value | printf \"%.2f\" }}% over the last 5 minutes."

  - alert: Watchdog
    expr: vector(1)
    for: 1m
    labels:
      severity: none
    annotations:
      summary: "Monitoring Pipeline Heartbeat (Dead Man's Switch)"
      description: "This alert is meant to ALWAYS fire. If it stops firing, the monitoring system (Prometheus/Alertmanager) is down."

  - alert: LatencySLOViolation
    expr: |
      histogram_quantile(0.9, sum by (le) (rate(http_server_duration_bucket{exported_job="go-web-service"}[5m]))) > 0.5
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Latency SLO Violated (p90 > 500ms)"
      description: "90% of requests are taking longer than 500ms (currently {{ $value }}s)."
